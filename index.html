<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Locked Weather Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="page-header">
      <div class="header-main">
        <h1>Weather Dashboard</h1>
        <div class="current-time" id="current-time">Current time: --</div>
      </div>
      <div class="control-panel">
        <div class="action-bar">
          <button id="location-toggle" class="secondary-btn location-btn">Switch location</button>
          <button id="refresh-btn" class="secondary-btn">Refresh</button>
          <button id="theme-toggle" class="secondary-btn">Light theme</button>
          <button id="unit-toggle" class="secondary-btn">Metric / English</button>
          <div class="last-updated" id="last-updated">Last updated: --</div>
        </div>
      </div>
    </header>

    <main id="weather-root" class="weather-grid"></main>

    <footer class="page-footer">
      <p>Weather data from Open-Meteo &middot; Radar from RainViewer &middot; Locations locked to Terrebonne and West Menlo Park</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
